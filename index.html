<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1 class="text-warning mt-3">Heat Index Checker</h1>
            <details class="text-warning">
                <summary>Note!</summary>
                <i class="text-light">Input the temperature (&deg;C) and humidity (&percnt;), then click the button to see the heat index and its status.</i>
            </details>
            <br>

            <h5 class="text-warning mb-2">Temperature in &deg;C</h5>
            <input type="text" class="form-control mb-4 text-center" id="tempEntry">

            <h5 class="text-warning mb-2">Humidity in &percnt;</h5>
            <input type="text" class="form-control text-center" id="humidEntry">

            <hr>
            <button type="button" class="btn btn-warning" onclick="checkHeat()">Check Heat Index</button>
        </div>
    </div>

<script src="main.js"></script>
</body>
</html>
